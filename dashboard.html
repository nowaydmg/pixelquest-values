<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Quest Values</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Pixel Quest Vault</h1>
            <div class="header-right">
                <button id="themeToggle" class="btn btn-secondary" type="button">☀️ Light</button>
                <span id="userInfo"></span>
                <button onclick="logout()" class="btn btn-logout">Logout</button>
            </div>
        </header>

        <div class="container">
            <div id="adminPanel" style="display: none;" class="admin-panel">
                <div class="panel-heading">
                    <h2>Admin control</h2>
                    <p>Create or edit items in the vault.</p>
                </div>
                <div class="form-grid">
                    <input type="hidden" id="editingItemIndex">
                    <input type="text" id="itemIcon" placeholder="Image URL or emoji">
                    <input type="text" id="itemName" placeholder="Item name">
                    <input type="number" id="itemCorruptedPages" placeholder="Corrupted Pages">
                    <input type="text" id="itemTier" placeholder="Tier">
                    <select id="itemRarity">
                        <option value="Common">Common</option>
                        <option value="Rare">Rare</option>
                        <option value="Epic">Epic</option>
                        <option value="Legendary">Legendary</option>
                    </select>
                    <input type="text" id="itemType" placeholder="Type">
                    <div class="form-actions">
                        <button id="saveItemBtn" type="button" class="btn btn-primary">Add item</button>
                        <button id="cancelEditBtn" type="button" class="btn btn-secondary">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by name, icon or type..." onkeyup="filterTable()">
                </div>
                <div class="toolbar-actions">
                    <button id="importBtn" type="button" class="btn btn-secondary">Import JSON</button>
                    <button id="exportJsonBtn" type="button" class="btn btn-secondary">Export JSON</button>
                    <button id="exportCsvBtn" type="button" class="btn btn-secondary">Export CSV</button>
                </div>
                <input type="file" id="importInput" accept="application/json" hidden>
            </div>

            <table id="pricesTable">
                <thead>
                    <tr>
                        <th>Icon</th>
                        <th><button class="sort-btn" type="button" data-sort="name">Item</button></th>
                        <th><button class="sort-btn" type="button" data-sort="corruptedPages">CP</button></th>
                        <th><button class="sort-btn" type="button" data-sort="tier">Tier</button></th>
                        <th><button class="sort-btn" type="button" data-sort="rarity">Rarity</button></th>
                        <th><button class="sort-btn" type="button" data-sort="type">Type</button></th>
                        <th id="adminCol" style="display: none;">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <footer>
                <p>Last update: <span id="lastUpdate"></span></p>
            </footer>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
