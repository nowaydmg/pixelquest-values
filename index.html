<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Quest Values</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <div class="auth-card">
            <div class="brand-block">
                <div class="brand-icon">⚔️</div>
                <div>
                    <h1>PIXEL QUEST</h1>
                    <p>Values Vault</p>
                </div>
            </div>

            <div class="auth-toggle" role="tablist" aria-label="Authentication mode">
                <button class="toggle-btn active" data-mode="login" type="button">Login</button>
                <button class="toggle-btn" data-mode="register" type="button">Register</button>
            </div>

            <form id="loginForm" class="auth-panel active" onsubmit="handleLoginSubmit(event)">
                <div class="form-group">
                    <label for="loginUsername">Player ID</label>
                    <input id="loginUsername" type="text" placeholder="Enter login..." onkeypress="handleEnter(event)">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input id="loginPassword" type="password" placeholder="Enter password..." onkeypress="handleEnter(event)">
                </div>

                <button class="btn-auth" type="submit">Enter Realm</button>
            </form>

            <form id="registerForm" class="auth-panel" onsubmit="handleRegisterSubmit(event)">
                <div class="form-group">
                    <label for="registerUsername">Player ID</label>
                    <input id="registerUsername" type="text" placeholder="Choose nickname...">
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input id="registerPassword" type="password" placeholder="Create password...">
                </div>

                <div class="form-group">
                    <label for="registerConfirmPassword">Confirm Password</label>
                    <input id="registerConfirmPassword" type="password" placeholder="Repeat password...">
                </div>

                <button class="btn-auth btn-register" type="submit">Create Account</button>
            </form>

            <div id="authMessage" class="auth-message" aria-live="polite"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
